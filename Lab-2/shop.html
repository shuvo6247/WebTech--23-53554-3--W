<html>
    <head>
        <title>Welcome to Pental Shop</title>
         <link rel="stylesheet" href="shop.css">
    </head>
     
    <body>
    <h1>Welcome to Pental shop</h1>
    <h2>About This Lab</h2>
    <p>In this lab, you learn basic HTML structure, formatting text, creating simple tables, and using forms for input.</p>
    
    <table>
        <tr>
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>Pencils</td>
            <td>100</td>
            <td>In Stock</td>
        </tr>
        <tr>
            <td>Notebooks</td>
            <td>50</td>
            <td>Low stocks</td>
        </tr>
        <tr>
            <td>Markers</td>
            <td>15</td>
            <td>In stock</td>
        </tr>
    </table>

    <div class="form-container">
        <h3>Contact Information</h3> 
        <form>
            <div class="form-group">
                <label>Name</label>
                <input type="text">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea></textarea> 
            </div>
            <button type="submit">Submit</button>
        </form>
    </div>
   
</body>
</html>
